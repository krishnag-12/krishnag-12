<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <!-- Card gradient -->
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#151b28"/>
    </linearGradient>

    <!-- Lanyard strap gradient -->
    <linearGradient id="strap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00d4ff" flood-opacity="0.08"/>
    </filter>

    <!-- Dot pattern for card texture -->
    <pattern id="cardDots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.4" fill="#00d4ff" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- ═══ LANYARD STRAP ═══ -->
  <!-- Left strap -->
  <path d="M120,0 L120,55 Q120,65 130,70 L142,75" stroke="url(#strap)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Right strap -->
  <path d="M180,0 L180,55 Q180,65 170,70 L158,75" stroke="url(#strap)" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Clip/clasp -->
  <rect x="138" y="68" width="24" height="14" rx="3" fill="#1a1b2e" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="150" cy="75" r="3" fill="#00d4ff" opacity="0.4"/>

  <!-- ═══ ID CARD ═══ -->
  <rect x="30" y="85" width="240" height="305" rx="16" fill="url(#card)" filter="url(#shadow)"
        stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Card texture -->
  <rect x="30" y="85" width="240" height="305" rx="16" fill="url(#cardDots)"/>

  <!-- Top accent band -->
  <rect x="30" y="85" width="240" height="4" rx="16" fill="#00d4ff" opacity="0.3"/>

  <!-- Photo placeholder (circuit board pattern instead of photo) -->
  <rect x="105" y="110" width="90" height="90" rx="12" fill="#0d1117"
        stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Simple IC chip icon inside photo area -->
  <g transform="translate(130,130)" stroke="#00d4ff" fill="none" opacity="0.4">
    <!-- IC body -->
    <rect x="0" y="0" width="40" height="40" rx="4" stroke-width="1.2"/>
    <!-- Pins left -->
    <line x1="-8" y1="10" x2="0" y2="10" stroke-width="1"/>
    <line x1="-8" y1="20" x2="0" y2="20" stroke-width="1"/>
    <line x1="-8" y1="30" x2="0" y2="30" stroke-width="1"/>
    <!-- Pins right -->
    <line x1="40" y1="10" x2="48" y2="10" stroke-width="1"/>
    <line x1="40" y1="20" x2="48" y2="20" stroke-width="1"/>
    <line x1="40" y1="30" x2="48" y2="30" stroke-width="1"/>
    <!-- Pins top -->
    <line x1="10" y1="-8" x2="10" y2="0" stroke-width="1"/>
    <line x1="20" y1="-8" x2="20" y2="0" stroke-width="1"/>
    <line x1="30" y1="-8" x2="30" y2="0" stroke-width="1"/>
    <!-- Pins bottom -->
    <line x1="10" y1="40" x2="10" y2="48" stroke-width="1"/>
    <line x1="20" y1="40" x2="20" y2="48" stroke-width="1"/>
    <line x1="30" y1="40" x2="30" y2="48" stroke-width="1"/>
    <!-- Die dot -->
    <circle cx="10" cy="10" r="3" fill="#a78bfa" opacity="0.5"/>
  </g>

  <!-- Divider line -->
  <line x1="60" y1="215" x2="240" y2="215" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>

  <!-- Name -->
  <text x="150" y="242" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="700" fill="#e2e8f0" letter-spacing="1">
    KRISHNA GUPTA
  </text>

  <!-- Title -->
  <text x="150" y="265" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="400" fill="#00d4ff" opacity="0.9">
    Hardware &amp; Embedded Engineer
  </text>

  <!-- Institution -->
  <text x="150" y="285" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" font-weight="400" fill="#8b949e">
    BMS College of Engineering
  </text>

  <text x="150" y="300" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9.5" font-weight="400" fill="#8b949e">
    ECE • Final Year
  </text>

  <!-- Bottom accent band -->
  <line x1="80" y1="320" x2="220" y2="320" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>

  <!-- Domains -->
  <text x="150" y="340" text-anchor="middle"
        font-family="'Consolas', 'Courier New', monospace"
        font-size="8.5" fill="#a78bfa" opacity="0.8" letter-spacing="0.5">
    RTL · FPGA · Embedded · AI HW
  </text>

  <!-- Bottom accent -->
  <rect x="30" y="386" width="240" height="4" rx="2" fill="#a78bfa" opacity="0.15"/>

  <!-- Corner accent dots -->
  <circle cx="48" cy="103" r="2" fill="#00d4ff" opacity="0.15"/>
  <circle cx="252" cy="103" r="2" fill="#00d4ff" opacity="0.15"/>
  <circle cx="48" cy="372" r="2" fill="#a78bfa" opacity="0.15"/>
  <circle cx="252" cy="372" r="2" fill="#a78bfa" opacity="0.15"/>
</svg>
