<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="40%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1a1b2e"/>
    </linearGradient>

    <!-- Engineering dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#00d4ff" opacity="0.05"/>
    </pattern>


  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="900" height="220" fill="url(#bg)"/>
  <rect width="900" height="220" fill="url(#dots)"/>

  <!-- ═══ PCB TRACES (bottom cluster) ═══ -->
  <g stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.09">
    <path d="M-10,188 H70 V173 H190 V188 H330"/>
    <path d="M570,188 H690 V173 H790 V188 H910"/>
    <path d="M-10,198 H50 V203 H140"/>
    <path d="M760,198 H850 V203 H910"/>
  </g>

  <!-- PCB TRACES (top cluster) -->
  <g stroke="#00d4ff" stroke-width="0.7" fill="none" opacity="0.07">
    <path d="M-10,28 H40 V42 H140 V28 H240"/>
    <path d="M660,28 H760 V42 H860 V28 H910"/>
  </g>

  <!-- ═══ VIA DOTS ═══ -->
  <g fill="#00d4ff" opacity="0.12">
    <!-- Bottom -->
    <circle cx="70" cy="188" r="3"/>
    <circle cx="190" cy="188" r="3"/>
    <circle cx="330" cy="188" r="2.5"/>
    <circle cx="570" cy="188" r="2.5"/>
    <circle cx="690" cy="188" r="3"/>
    <circle cx="790" cy="188" r="3"/>
    <!-- Top -->
    <circle cx="40" cy="28" r="2.5"/>
    <circle cx="140" cy="28" r="2.5"/>
    <circle cx="240" cy="28" r="2"/>
    <circle cx="660" cy="28" r="2"/>
    <circle cx="760" cy="28" r="2.5"/>
    <circle cx="860" cy="28" r="2.5"/>
  </g>

  <!-- ═══ LOGIC GATE: AND (upper left, very subtle) ═══ -->
  <g stroke="#a78bfa" stroke-width="0.6" fill="none" opacity="0.06" transform="translate(55,55)">
    <path d="M0,0 H12 C28,0 28,28 12,28 H0 Z"/>
    <line x1="-12" y1="7" x2="0" y2="7"/>
    <line x1="-12" y1="21" x2="0" y2="21"/>
    <line x1="24" y1="14" x2="36" y2="14"/>
  </g>

  <!-- ═══ LOGIC GATE: OR (upper right, very subtle) ═══ -->
  <g stroke="#a78bfa" stroke-width="0.6" fill="none" opacity="0.06" transform="translate(800,50)">
    <path d="M0,0 Q6,0 18,14 Q6,28 0,28 Q8,14 0,0 Z"/>
    <line x1="-12" y1="7" x2="3" y2="7"/>
    <line x1="-12" y1="21" x2="3" y2="21"/>
    <line x1="18" y1="14" x2="30" y2="14"/>
  </g>

  <!-- ═══ OSCILLOSCOPE WAVEFORM (bottom edge) ═══ -->
  <path d="M0,208 C30,208 60,200 90,200 S150,208 180,208 S240,198 270,198 S330,208 360,208 S420,200 450,200 S510,208 540,208 S600,198 630,198 S690,208 720,208 S780,200 810,200 S870,208 900,208"
        stroke="#00d4ff" stroke-width="0.7" fill="none" opacity="0.06"/>

  <!-- ═══ SATELLITE ORBIT ARC (upper right) ═══ -->
  <ellipse cx="825" cy="22" rx="55" ry="12" stroke="#a78bfa" stroke-width="0.5" fill="none" opacity="0.08"
           stroke-dasharray="3,5" transform="rotate(-12,825,22)"/>
  <circle cx="862" cy="15" r="1.8" fill="#a78bfa" opacity="0.15"/>

  <!-- ═══ ACCENT LINES ═══ -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="219" x2="900" y2="219" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ═══ TYPOGRAPHY                                  ═══ -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Name -->
  <text x="450" y="84" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', system-ui, -apple-system, sans-serif"
        font-size="38" font-weight="700" letter-spacing="5"
        fill="#e2e8f0">KRISHNA GUPTA</text>

  <!-- Tagline -->
  <text x="450" y="118" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', system-ui, -apple-system, sans-serif"
        font-size="15" font-weight="300" font-style="italic"
        fill="#00d4ff">Architecting digital systems from register transfer to silicon</text>

  <!-- Domain keywords -->
  <text x="450" y="152" text-anchor="middle"
        font-family="'Consolas', 'Courier New', 'Liberation Mono', monospace"
        font-size="12" font-weight="400" letter-spacing="1.5"
        fill="#a78bfa">RTL Design  ·  FPGA  ·  Embedded Systems  ·  AI Hardware  ·  Space Tech</text>

  <!-- Thin accent underline -->
  <line x1="270" y1="166" x2="630" y2="166" stroke="#00d4ff" stroke-width="0.5" opacity="0.25"/>
</svg>
