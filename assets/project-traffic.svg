<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 185" width="430" height="185">
  <defs>
    <linearGradient id="cbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

  </defs>

  <!-- Card body -->
  <rect x="1" y="1" width="428" height="183" rx="12" fill="url(#cbg)"
        stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- Top accent bar -->
  <rect x="1" y="1" width="428" height="3" rx="12" fill="#00d4ff" opacity="0.35"/>

  <!-- Title -->
  <text x="20" y="34" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="700" fill="#e2e8f0">
    Advanced Traffic Management System
  </text>

  <!-- Description -->
  <text font-family="'Segoe UI', system-ui, sans-serif" font-size="11.5" fill="#8b949e">
    <tspan x="20" y="56">Adaptive 4-way traffic signal controller with</tspan>
    <tspan x="20" dy="16">sensor-driven priority and emergency override</tspan>
  </text>

  <!-- Tech tags -->
  <g font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <rect x="20" y="94" width="95" height="20" rx="4" fill="#00d4ff" fill-opacity="0.07"
          stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="67" y="108" text-anchor="middle" fill="#00d4ff">SystemVerilog</text>

    <rect x="122" y="94" width="73" height="20" rx="4" fill="#a78bfa" fill-opacity="0.07"
          stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="158" y="108" text-anchor="middle" fill="#a78bfa">RTL Design</text>

    <rect x="202" y="94" width="45" height="20" rx="4" fill="#00d4ff" fill-opacity="0.07"
          stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="224" y="108" text-anchor="middle" fill="#00d4ff">FPGA</text>
  </g>

  <!-- Achievement -->
  <text x="20" y="140" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10.5" font-style="italic" fill="#a78bfa" opacity="0.9">
    &#x25B8; Synthesizable FSM with multi-mode signal arbitration
  </text>

  <!-- Separator -->
  <line x1="20" y1="152" x2="410" y2="152" stroke="#00d4ff" stroke-width="0.3" opacity="0.12"/>

  <!-- Link indicator -->
  <text x="20" y="172" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#00d4ff" opacity="0.7">
    View on GitHub &#x2192;
  </text>
</svg>
